server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The UI is a self-contained mock SPA — no backend, no API reverse-proxy.
    # When the BE track lands, add a `location ~ ^/(auth|v1|agent)…` proxy_pass
    # block here (see git history) and point the API client at the same origin.

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed, immutable build assets — safe to cache hard.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # The entry HTML must NEVER be cached, or browsers get stuck serving an old
    # build (old bundle → old routes → phantom redirects) after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # SPA fallback — BrowserRouter handles client-side routes, so any deep link
    # (e.g. /projects/123) or hard refresh must serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse-proxy → backend ──────────────────────────────────────────
    # The frontend uses *relative* API URLs (same origin), so it works regardless
    # of the host/port the browser actually loaded the UI from (localhost, LAN IP,
    # public domain, behind a TLS proxy). nginx forwards these prefixes untouched.
    #   browser → :3000/auth/register  →  backend:8000/auth/register
    #
    # This mirrors how OpenClaw MC exposes BASE_URL: no absolute URL is baked in.

    # Default proxy settings for normal JSON endpoints.
    location ~ ^/(auth|v1|agent|healthz|static)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 25m;
    }

    # SSE streams (live run trace) — disable buffering or events never flush.
    location ~ ^/v1/runs/[^/]+/(stream|events)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── static SPA assets ────────────────────────────────────────────────────
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The UI proxies /auth, /v1, /agent to the backend container (same origin), so the
    # SPA's API client needs no build-time URL and there's no CORS in the composed stack.

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Backend API reverse-proxy ───────────────────────────────────────────────
    # Same-origin: the SPA talks to /auth, /v1, /agent on its own origin and nginx
    # forwards to the backend container. Buffering is off so the Hybrid SSE streams
    # (/v1/.../events, /v1/.../stream) flush each event to the browser immediately.
    location ~ ^/(auth|v1|agent)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-safe: never buffer the stream, hold the connection open for live events.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Hashed, immutable build assets — safe to cache hard.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # The entry HTML must NEVER be cached, or browsers get stuck serving an old
    # build (old bundle → old routes → phantom redirects) after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # SPA fallback — BrowserRouter handles client-side routes, so any deep link
    # (e.g. /projects/123) or hard refresh must serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Illuminated initial "A" — the Armarius mark, echoing the ARMARIUS wordmark -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8C96A"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  <!-- deep-ink manuscript tile with a gilt border -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="#1A1410"/>
  <rect x="2" y="2" width="60" height="60" rx="13" fill="none" stroke="#C9A227" stroke-opacity="0.45" stroke-width="2"/>
  <!-- the illuminated "A" -->
  <text x="32" y="33" fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif"
        font-size="46" font-weight="700" text-anchor="middle" dominant-baseline="central">A</text>
</svg>

# Armarius. Copy .env.sample to .env to override ports, then:
#
#   docker compose up --build            → mock-data UI only (no backend yet)
#   docker compose --profile backend up --build   → full stack (db + API + UI)
#
# The frontend is currently a self-contained MOCK SPA (in-memory store, no API),
# so the default `up` builds just the UI. The backend (db + API) lives behind the
# `backend` profile until the BE track is wired in.
#
# Dashboard → http://localhost:${FRONTEND_PORT:-3000}   API → http://localhost:${BACKEND_PORT:-8080}

services:
  frontend:
    build:
      context: ./frontend
      # Build on the host network so npm can reach the registry even where
      # BuildKit's isolated build network has no DNS. Harmless elsewhere.
      network: host
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  db:
    image: postgres:16-alpine
    profiles: ["backend"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-armarius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-armarius}
      POSTGRES_DB: ${POSTGRES_DB:-armarius}
    volumes:
      - armarius_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-armarius} -d ${POSTGRES_DB:-armarius}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    profiles: ["backend"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-armarius}:${POSTGRES_PASSWORD:-armarius}@db:5432/${POSTGRES_DB:-armarius}
      # Public URL of THIS API that agents call back into — advertised in invitations.
      # For remote agents set ARMARIUS_PUBLIC_URL to a reachable origin (e.g. https://armarius.example.com).
      PUBLIC_BASE_URL: ${ARMARIUS_PUBLIC_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ARTIFACT_STORE_ROOT: /data/artifacts
    volumes:
      - armarius_artifacts:/data/artifacts
    # DEV-ONLY convenience: lets a hermes_gateway Marius reach a Hermes running on the
    # SAME host as this compose (base_url http://host.docker.internal:8642). For agents
    # on other machines, just set that Marius's base_url to its own reachable URL.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8000"

volumes:
  armarius_db:
  armarius_artifacts:

# Armarius — full stack. Copy .env.sample to .env to override, then:
#
#   docker compose up --build
#
# Brings up the whole stack: Postgres + MinIO + backend (API, auto-migrates on boot)
# + frontend (nginx-served SPA that reverse-proxies /auth, /v1, /agent to the backend).
# The seed runs on a fresh DB, so log in as demo@acme.dev / demo1234 (see .env.sample).
#
# Dashboard → http://localhost:${FRONTEND_PORT:-3000}   API → http://localhost:${BACKEND_PORT:-8080}

services:
  frontend:
    build:
      context: ./frontend
      # Build on the host network so npm can reach the registry even where
      # BuildKit's isolated build network has no DNS. Harmless elsewhere.
      network: host
      # Vite bakes this in at BUILD time — changing it in .env needs a rebuild
      # (docker compose up --build), not just a restart.
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-armarius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-armarius}
      POSTGRES_DB: ${POSTGRES_DB:-armarius}
    volumes:
      - armarius_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-armarius} -d ${POSTGRES_DB:-armarius}"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Shared Artifact Store (ARCHITECTURE §7). Internal-only: the backend reaches it at
  # minio:9000 over the compose network — no host ports published (avoids local 9000/9001
  # conflicts). To browse the console, add a `ports:` mapping to a free host port.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-armarius}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-armarius123}
    volumes:
      - armarius_minio:/data

  backend:
    build:
      context: ./backend
      # Build on the host network so pip can reach PyPI even where BuildKit's
      # isolated build network has no DNS (matches the frontend). Harmless elsewhere.
      network: host
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-armarius}:${POSTGRES_PASSWORD:-armarius}@db:5432/${POSTGRES_DB:-armarius}
      # Public URL of THIS API that agents call back into — advertised in invitations.
      # For remote agents set ARMARIUS_PUBLIC_URL to a reachable origin (e.g. https://armarius.example.com).
      PUBLIC_BASE_URL: ${ARMARIUS_PUBLIC_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      # Shared Artifact Store → MinIO (bucket created on boot). The endpoint is the
      # in-network address of the minio service; only override when pointing at an
      # external S3/MinIO.
      ARTIFACT_STORE_BACKEND: ${ARTIFACT_STORE_BACKEND:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-armarius}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-armarius123}
      MINIO_BUCKET: ${MINIO_BUCKET:-armarius}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      # JWT signing (dev defaults; override JWT_SECRET in production).
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-30}
      JWT_REFRESH_EXPIRE_DAYS: ${JWT_REFRESH_EXPIRE_DAYS:-7}
      # Demo seed — runs once on a fresh DB so the showcase journey is reachable.
      # (The .env var is ARMARIUS_*-namespaced; compose maps it to the Settings field
      # name the app reads — same pattern as PUBLIC_BASE_URL below.)
      SEED_DEMO: ${ARMARIUS_SEED_DEMO:-true}
      DEMO_EMAIL: ${ARMARIUS_DEMO_EMAIL:-demo@acme.dev}
      DEMO_PASSWORD: ${ARMARIUS_DEMO_PASSWORD:-demo1234}
    # DEV-ONLY convenience: lets a hermes_gateway Marius reach a Hermes running on the
    # SAME host as this compose (base_url http://host.docker.internal:8642). For agents
    # on other machines, just set that Marius's base_url to its own reachable URL.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8080}:8000"

volumes:
  armarius_db:
  armarius_minio:
